<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telesint Бот Telegram — Официальное Зеркало Сервиса</title>
    <meta name="description" content="Актуальное рабочее зеркало Telesint. Проверка истории юзернеймов, поиск групп и построение дерева связей в Telegram для безопасности ваших сделок.">
    
    <style>
        /* Общие стили для страницы */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0e1621; /* Темная тема Telegram */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #f5f5f5;
        }

        p.subtitle {
            color: #708499;
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* Кнопка перехода в бота */
        .btn-link {
            display: inline-block;
            background-color: #2481cc;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(36, 129, 204, 0.3);
            margin-bottom: 20px;
        }
        .btn-link:hover {
            background-color: #288fd8;
        }
        .btn-link:active {
            transform: scale(0.98);
        }

        /* --- СТИЛИ ДЛЯ СЛАЙДЕРА ИНТЕРФЕЙСА --- */
        .slider-container {
            max-width: 340px; /* Оптимальная ширина под вертикальные скриншоты */
            width: 100%;
            margin: 30px auto 10px auto;
            position: relative;
            overflow: hidden;
            border-radius: 14px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
            background: #17212b;
            border: 1px solid #24303f;
        }

        .slider-track {
            display: flex;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            width: 100%;
        }

        .slide {
            min-width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }

        /* Стрелочки навигации */
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(23, 33, 43, 0.85);
            color: #fff;
            border: 1px solid #2b394a;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
            z-index: 10;
        }
        .slider-btn:hover {
            background: #243140;
        }
        .prev-btn { left: 8px; }
        .next-btn { right: 8px; }

        /* Точки-индикаторы */
        .slider-dots {
            text-align: center;
            margin-bottom: 40px;
        }
        .dot {
            width: 8px;
            height: 8px;
            margin: 0 5px;
            background-color: #435465;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.3s, transform 0.3s;
            cursor: pointer;
        }
        .dot.active {
            background-color: #5288c1;
            transform: scale(1.2);
        }

        /* --- СТИЛИ ДЛЯ НЕБРОСКОГО ФУТЕРА --- */
        .footer-links {
            margin-top: auto;
            padding: 30px 0 10px 0;
            font-size: 12px;
            width: 100%;
            text-align: center;
        }
        .footer-links p {
            color: #536573;
        }
        .footer-links a {
            color: #536573;
            text-decoration: none;
            border-bottom: 1px dotted #435465;
            transition: color 0.2s, border-color 0.2s;
        }
        .footer-links a:hover {
            color: #5288c1;
            border-bottom-color: #5288c1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Зеркало Telesint в Telegram</h1>
        <p class="subtitle">Поиск и глубокий анализ аккаунтов. Проверка связей, истории юзернеймов и групп для обеспечения безопасности сделок и вычисления мошенников.</p>
        
        <a href="#" class="btn-link" target="_blank">Запустить Telesint Бот</a>

        <div class="slider-container">
            <button class="slider-btn prev-btn">&#10094;</button>
            
            <div class="slider-track">
                <div class="slide">
                    <img src="slide1.png" alt="Интерфейс Telesint - Панель">
                </div>
                <div class="slide">
                    <img src="slide2.png" alt="Интерфейс Telesint - Поиск групп">
                </div>
                <div class="slide">
                    <img src="slide3.png" alt="Интерфейс Telesint - Связи">
                </div>
                <div class="slide">
                    <img src="slide4.png" alt="Интерфейс Telesint - Результаты">
                </div>
            </div>

            <button class="slider-btn next-btn">&#10095;</button>
        </div>

        <div class="slider-dots">
            <span class="dot active" onclick="currentSlide(0)"></span>
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div>
    </div>

    <footer class="footer-links">
        <p>Информационный ресурс. Интеграция с <a href="https://t.me/telesint" target="_blank" rel="noopener noreferrer">официальным каналом проекта Telesint</a></p>
    </footer>

    <script>
        const track = document.querySelector('.slider-track');
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        const nextBtn = document.querySelector('.next-btn');
        const prevBtn = document.querySelector('.prev-btn');

        let currentIndex = 0;

        function updateSlider() {
            // Двигаем дорожку со слайдами
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
            
            // Переключаем активную точку
            dots.forEach(dot => dot.classList.remove('active'));
            dots[currentIndex].classList.add('active');
        }

        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) < slides.length ? currentIndex + 1 : 0;
            updateSlider();
        });

        prevBtn.addEventListener('click', () => {
            currentIndex = (currentIndex - 1) >= 0 ? currentIndex - 1 : slides.length - 1;
            updateSlider();
        });

        function currentSlide(index) {
            currentIndex = index;
            updateSlider();
        }
    </script>
</body>
</html>
